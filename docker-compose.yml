version: "3.9"

services:
  key-gen:
    build:
      context: .
      dockerfile: Dockerfile.mongo.init
    volumes:
      - mongo_key:/mnt/shared

  mongo:
    image: mongo:6
    container_name: mongo_db
    hostname: mongo-server
    depends_on:
      key-gen:
        condition: service_completed_successfully
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mi_usuario
      - MONGO_INITDB_ROOT_PASSWORD=mi_password_seguro
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_key:/data/configdb
    command: [ "mongod", "--replSet", "rs0", "--bind_ip_all", "--keyFile", "/data/configdb/keyfile" ]
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo-init:
    image: mongo:6
    depends_on:
      mongo:
        condition: service_healthy
    entrypoint: >
      mongosh --host mongo-server -u mi_usuario -p mi_password_seguro --authenticationDatabase admin  --eval "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo-server:27017'}]}) }"

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mi_usuario:mi_password_seguro@mongo-server:27017/?authSource=admin&directConnection=true
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=pass
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
  mongo_key:
