events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;

        # Frontend Web
        location / {
            auth_basic "PokeApp - Acceso Restringido";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://poke-albo-frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Backends
        location /api1/ {
            proxy_pass http://poke-albo-backend1:3001/; 
            proxy_set_header Host $host;
        }

        location /api2/ {
            proxy_pass http://poke-albo-backend2:3002/;
            proxy_set_header Host $host;
        }

        location /battle-api/ {
            proxy_pass http://poke-albo-battle-service:3004/;
            proxy_set_header Host $host;
        }
        
        # WebSockets Batallas
        location /battle-ws {
            proxy_pass http://poke-albo-battle-service:3004;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Administración de DB
        location /mongo-admin/ {
            # Limpiamos cualquier credencial previa del .htpasswd
            proxy_set_header Authorization "";

            proxy_pass http://mongo-express:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}